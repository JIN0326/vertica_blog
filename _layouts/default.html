<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ page.excerpt | default: site.description }}" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
    <style>
      body { font-size: 17px; } /* 전체 글씨 크기를 약간 확대 */
      .site-nav { display: flex; align-items: center; gap: 24px; font-size: 1.1rem; }
      .dropdown { position: relative; display: inline-block; padding: 10px 0; }
      .dropdown > a { font-weight: 600; }
      .dropdown-content { display: none; position: absolute; top: 100%; left: 0; background-color: #ffffff; min-width: 220px; box-shadow: 0 10px 30px rgba(45, 105, 255, 0.15); z-index: 1000; border-radius: 10px; overflow: hidden; border: 1px solid rgba(45, 105, 255, 0.1); margin-top: -5px; }
      .dropdown-content a { color: #2f3340; padding: 12px 18px; text-decoration: none; display: block; font-size: 1rem; border-bottom: 1px solid #f4f8ff; font-weight: normal; }
      .dropdown-content a:last-child { border-bottom: none; }
      .dropdown-content a:hover { background-color: #eef3ff; color: #2d69ff; font-weight: 500; }
      .dropdown:hover .dropdown-content { display: block; }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="header-inner">
          <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <nav class="site-nav">
            <a href="{{ '/' | relative_url }}">Home</a>
            
            <div class="dropdown">
              <a href="{{ '/playbook' | relative_url }}">Vertica Playbook</a>
              <div class="dropdown-content">
                <a href="{{ '/what-is-vertica' | relative_url }}">Vertica란 무엇인가</a>
                <a href="{{ '/technology' | relative_url }}">Vertica 핵심 기술</a>
                <a href="{{ '/portfolio' | relative_url }}">Vertica 포트폴리오</a>
                <a href="{{ '/architecture' | relative_url }}">아키텍처 장점</a>
              </div>
            </div>

            <div class="dropdown">
              <a href="{{ '/administration' | relative_url }}">Vertica Administration</a>
              <div class="dropdown-content">
                <a href="{{ '/administration-table-projection' | relative_url }}">Table · Projection</a>
                <a href="{{ '/administration-schema' | relative_url }}">Schema</a>
                <a href="{{ '/administration-user' | relative_url }}">User</a>
                <a href="{{ '/administration-profile' | relative_url }}">Profile</a>
                <a href="{{ '/administration-resource-pool' | relative_url }}">Resource Pools</a>
                <a href="{{ '/administration-privilege' | relative_url }}">Privilege</a>
              </div>
            </div>

            <div class="dropdown">
              <a href="{{ '/fundamentals' | relative_url }}">Vertica Fundamentals</a>
              <div class="dropdown-content">
                <a href="{{ '/what-is-vertica' | relative_url }}">Vertica 학습하기</a>
              </div>
            </div>
          </nav>
        </div>
      </header>

      <main class="site-content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="footer-inner">
          <p>© 2026 Vertica Blog. All rights reserved.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
