<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ page.excerpt | default: site.description }}" />
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="header-inner">
          <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <nav class="site-nav">
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/' | relative_url }}#playbook">Vertica Playbook</a>
            <a href="{{ '/administration' | relative_url }}">Vertica Administration</a>
            <a href="{{ '/fundamentals' | relative_url }}">Vertica Fundamentals</a>
          </nav>
        </div>
      </header>

      <main class="site-content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="footer-inner">
          <p>© 2026 Vertica Blog. All rights reserved.</p>
        </div>
      </footer>
    </div>
  </body>
</html>
